<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taiman AI PRO Kamera</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{
margin:0;
background:#000;
color:#0ff;
font-family:Arial;
text-align:center;
}

h2{
margin:10px;
text-shadow:0 0 10px cyan;
}

#container{
position:relative;
width:100%;
max-width:700px;
margin:auto;
border:2px solid cyan;
border-radius:10px;
box-shadow:0 0 20px cyan;
}

video{
width:100%;
background:#000;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#info{
font-size:20px;
margin-top:10px;
color:#0f0;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
background:cyan;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h2> Taiman AI PRO Kamera</h2>

<div id="container">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<div id="info">Boshlash tugmasini bosing</div>

<button onclick="startApp()"> Boshlash</button>
<button onclick="switchCamera()"> Kamera almashtirish</button>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let model;
let stream;
let camera="environment";
let started=false;

// O‘zbekcha tarjima
const uz = {
"person":"Inson",
"bottle":"Shisha",
"cell phone":"Telefon",
"chair":"Stul",
"cup":"Chashka",
"laptop":"Noutbuk",
"tv":"Televizor",
"potted plant":"O‘simlik",
"book":"Kitob",
"dog":"It",
"cat":"Mushuk"
};

async function startApp(){

if(started) return;
started=true;

document.getElementById("info").innerText="Kamera ruxsati so‘ralmoqda...";

try{
await startCamera();
await loadAI();
}catch(e){
alert("Xatolik: " + e.message);
}

}

async function startCamera(){

if(stream) stream.getTracks().forEach(t=>t.stop());

try{

stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:camera,
width:{ideal:1280},
height:{ideal:720}
}
});

video.srcObject = stream;

//  MUHIM FIX
await video.play();

video.onloadedmetadata = ()=>{
video.play();
};

}catch(e){
alert("Kamera ishlamadi: " + e.message);
throw e;
}

}

function switchCamera(){
camera = camera==="environment" ? "user" : "environment";
if(started) startCamera();
}

async function loadAI(){

document.getElementById("info").innerText="AI yuklanmoqda...";

model = await cocoSsd.load();

document.getElementById("info").innerText="AI tayyor!";
detect();

}

function detect(){

setInterval(async()=>{

if(!video.videoWidth) return;

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const predictions = await model.detect(video);

//  mayda obyektlar uchun
const filtered = predictions.filter(p=>p.score > 0.2);

ctx.clearRect(0,0,canvas.width,canvas.height);

let counts={};

filtered.forEach(p=>{

if(!counts[p.class]) counts[p.class]=0;
counts[p.class]++;

const [x,y,w,h]=p.bbox;

// HUD box
ctx.strokeStyle="cyan";
ctx.lineWidth=3;
ctx.shadowColor="cyan";
ctx.shadowBlur=15;
ctx.strokeRect(x,y,w,h);

const name = uz[p.class] || p.class;

// label
ctx.fillStyle="cyan";
ctx.font="16px Arial";
ctx.fillText(name+" "+Math.round(p.score*100)+"%", x, y>10?y-5:10);

});

// natija
let text="";
for(let item in counts){
let name = uz[item] || item;
text += name + " : " + counts[item] + "<br>";
}

document.getElementById("info").innerHTML = text || "Hech narsa topilmadi";

},200);

}

</script>

</body>
</html>
