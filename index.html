<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taiman AI PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{
margin:0;
background:#000;
color:#0ff;
font-family:Arial;
text-align:center;
}

#container{
position:relative;
width:100%;
max-width:700px;
margin:auto;
border:2px solid cyan;
border-radius:10px;
box-shadow:0 0 20px cyan;
}

video{
width:100%;
background:#000;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

#info{
font-size:20px;
margin-top:10px;
color:#0f0;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
background:cyan;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h2> Taiman AI PRO MAX</h2>

<div id="container">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<div id="info">Boshlash tugmasini bosing</div>

<button onclick="startApp()"> Boshlash</button>
<button onclick="switchCamera()"> Kamera almashtirish</button>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let model;
let stream;
let camera="environment";
let started=false;

let lastSpoken="";
let lastSpeakTime=0;

// O‘zbekcha nomlar
const uz = {
"person":"inson",
"bottle":"shisha",
"cell phone":"telefon",
"chair":"stul",
"cup":"chashka",
"laptop":"noutbuk",
"tv":"televizor",
"potted plant":"o‘simlik",
"book":"kitob",
"dog":"it",
"cat":"mushuk"
};

//  OVOZNI YOQISH (MUHIM)
function unlockVoice(){
const msg = new SpeechSynthesisUtterance(" ");
speechSynthesis.speak(msg);
}

//  OVOZ FUNKSIYA (FIXED)
function speak(text){

if(!text) return;

// takrorlamaslik
if(text===lastSpoken) return;

// delay (4 sekund)
let now = Date.now();
if(now - lastSpeakTime < 4000) return;

lastSpoken = text;
lastSpeakTime = now;

speechSynthesis.cancel();

const msg = new SpeechSynthesisUtterance(text);

// fallback voice
let voices = speechSynthesis.getVoices();
let voice = voices.find(v=>v.lang.includes("ru") || v.lang.includes("en"));

if(voice) msg.voice = voice;

msg.rate = 1;
msg.pitch = 1;

speechSynthesis.speak(msg);
}

// APP START
async function startApp(){

unlockVoice(); //  MUHIM

if(started) return;
started=true;

document.getElementById("info").innerText="Kamera ruxsati...";

try{
await startCamera();
await loadAI();
}catch(e){
alert("Xatolik: "+e.message);
}

}

// CAMERA
async function startCamera(){

if(stream) stream.getTracks().forEach(t=>t.stop());

stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:camera,
width:{ideal:1280},
height:{ideal:720}
}
});

video.srcObject=stream;

await video.play();

}

// CAMERA SWITCH
function switchCamera(){
camera = camera==="environment" ? "user" : "environment";
if(started) startCamera();
}

// AI LOAD
async function loadAI(){
document.getElementById("info").innerText="AI yuklanmoqda...";
model = await cocoSsd.load();
document.getElementById("info").innerText="AI tayyor!";
detect();
}

// DETECTION
function detect(){

setInterval(async()=>{

if(!video.videoWidth) return;

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const predictions = await model.detect(video);
const filtered = predictions.filter(p=>p.score>0.3);

ctx.clearRect(0,0,canvas.width,canvas.height);

let counts={};

filtered.forEach(p=>{

if(!counts[p.class]) counts[p.class]=0;
counts[p.class]++;

const [x,y,w,h]=p.bbox;

ctx.strokeStyle="cyan";
ctx.lineWidth=3;
ctx.shadowColor="cyan";
ctx.shadowBlur=15;
ctx.strokeRect(x,y,w,h);

const name = uz[p.class] || p.class;

ctx.fillStyle="cyan";
ctx.font="16px Arial";
ctx.fillText(name, x, y>10?y-5:10);

});

// TEXT + VOICE
let text="";
let voiceText="";

for(let item in counts){

let name = uz[item] || item;
let count = counts[item];

text += name + " : " + count + "<br>";
voiceText += count + " ta " + name + ", ";

}

document.getElementById("info").innerHTML = text || "Hech narsa topilmadi";

//  GAPIRADI
if(voiceText){
speak(voiceText);
}

},1500);

}

</script>

</body>
</html>
