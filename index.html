<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taiman AI PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{
margin:0;
background:#000;
color:#0ff;
font-family:Arial;
text-align:center;
}

#container{
position:relative;
width:100%;
max-width:700px;
margin:auto;
border:2px solid cyan;
border-radius:10px;
}

video{
width:100%;
background:#000;
}

canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none; /*  FIX */
}

#info{
font-size:20px;
margin-top:10px;
color:#0f0;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
background:cyan;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<h2> AI Kamera</h2>

<div id="container">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<div id="info">Boshlash tugmasini bosing</div>

<button onclick="startApp()"> Boshlash</button>
<button onclick="switchCamera()"> Kamera</button>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let model;
let stream;
let camera="environment";
let started=false;

function unlockVoice(){
speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
}

function speak(text){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
speechSynthesis.speak(msg);
}

async function startApp(){

unlockVoice();

if(started) return;
started=true;

try{
stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

await video.play();

model=await cocoSsd.load();

detect();

}catch(e){
alert("Xatolik: "+e.message);
}

}

function switchCamera(){
camera=camera==="environment"?"user":"environment";
startApp();
}

function detect(){

setInterval(async()=>{

if(!video.videoWidth) return;

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const predictions=await model.detect(video);

ctx.clearRect(0,0,canvas.width,canvas.height);

let count=predictions.length;

predictions.forEach(p=>{
const[x,y,w,h]=p.bbox;

ctx.strokeStyle="cyan";
ctx.lineWidth=3;
ctx.strokeRect(x,y,w,h);

ctx.fillStyle="cyan";
ctx.fillText(p.class,x,y-5);
});

document.getElementById("info").innerText="Topildi: "+count;

if(count>0){
speak(count+" ta obyekt bor");
}

},2000);

}

</script>

</body>
</html>
